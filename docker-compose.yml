services:
  postgres:
    image: postgres:16-alpine
    container_name: chainscope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chainscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chainscope}
      POSTGRES_DB: ${POSTGRES_DB:-chainscope}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - chainscope-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chainscope} -d ${POSTGRES_DB:-chainscope}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chainscope-pgdata:
    name: chainscope-pgdata
